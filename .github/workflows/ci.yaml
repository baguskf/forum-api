name: Continuous Integration

'on':
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forumapi_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      CI: true

      # HTTP SERVER
      HOST: localhost
      PORT: 3000

      # DATABASE
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: forumapi_test

      # TOKEN
      ACCESS_TOKEN_KEY: test_access_token_secret
      REFRESH_TOKEN_KEY: test_refresh_token_secret
      ACCESS_TOKEN_AGE: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate up

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint --if-present