name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    env:
      # HTTP SERVER
      HOST: 0.0.0.0
      PORT: 3000

      # POSTGRES
      PGHOST: forum-api.c7kkoiasod8b.ap-southeast-2.rds.amazonaws.com
      PGUSER: dicodingacademy
      PGDATABASE: forum-api
      PGPASSWORD: supersecret
      PGPORT: 5432

      # POSTGRES TEST
      PGHOST_TEST: forum-api.c7kkoiasod8b.ap-southeast-2.rds.amazonaws.com
      PGUSER_TEST: postgres
      PGDATABASE_TEST: forumapi_test
      PGPASSWORD_TEST: supersecret
      PGPORT_TEST: 5432

      # TOKENIZE
      ACCESS_TOKEN_KEY: 8b7b4ef375716ab08b2a3951b29d52fc00b1c855f9d1a847229b8c5935bef56d9d271e76a9cf08e614300395c3b90ebe559cf968a0741b18c9505549394b2c70
      REFRESH_TOKEN_KEY: 5078605e074a462b1460608fcbe0d0963c644402e04ad334455ff5a856cb43fd99825861dde02957d5e3184c90c532ca7d0249df20fe93d535632f3d11be7bad

      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migration
        run: npm run migrate up

      - name: Run unit test
        run: npm test

      - name: Run lint
        run: npm run lint --if-present