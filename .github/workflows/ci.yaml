name: Continuous Integration

'on':
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [20.x]

    env:
      NODE_ENV: test
      CI: true

      # HTTP SERVER
      HOST: 0.0.0.0
      PORT: 3000

      # POSTGRES
      PGHOST: forum-api.c7kkoiasod8b.ap-southeast-2.rds.amazonaws.com
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: supersecret
      PGDATABASE: forumapi_test

      # TOKEN
      ACCESS_TOKEN_KEY: test_access_token_secret
      REFRESH_TOKEN_KEY: test_refresh_token_secret
      ACCESS_TOKEN_AGE: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migration
        run: npm run migrate up

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint --if-present